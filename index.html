      background: linear-gradient(180deg, var(--card), var(--card2));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

      border:1px solid var(--line);
      color: var(--text);
      padding:10px 14px;
      border-radius: 12px;

      outline:none;
      font-family: inherit;
      font-size:14px;
    }
    input:focus{border-color: oklch(70% 0.12 230); box-shadow: 0 0 0 4px rgba(125,211,252,.18)}

      font-size:12px;
      color: var(--muted);
      background: rgba(0,0,0,.12);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .pill:has(input[type="checkbox"]){
      display:inline-flex;align-items:center;gap:5px;
      cursor:pointer;
      transition: background 120ms, border-color 120ms, color 120ms;
      user-select:none;
      padding:5px 12px;
      font-weight:500;
    }
    .pill:has(input[type="checkbox"]:checked){
      background: oklch(26% 0.04 230 / .6);
      border-color: oklch(42% 0.08 230);
      color: var(--text);
    }
    .pill:has(input[type="checkbox"]:not(:checked)){
      opacity:.45;
    }
    .pill:has(input[type="checkbox"]):hover{
      opacity:1;
      border-color: oklch(50% 0.06 230);
    }
    .pill input[type="checkbox"]{
      appearance:none;
      width:0;height:0;
      position:absolute;
    }

    /* Timeline container */
    .timeline{border-left:2px solid var(--line);padding-left:18px;}

    details{
      margin:0 0 4px;
      border:1px solid transparent;
      border-radius: var(--radius);
      transition: border-color 200ms cubic-bezier(0.16, 1, 0.3, 1), background 200ms cubic-bezier(0.16, 1, 0.3, 1);

      background: oklch(19% 0.02 255 / .5);

      cursor:pointer;
      user-select:none;
      padding:10px 14px;
      border-radius: var(--radius);
      font-size:14px;
      font-weight:600;
      color: var(--text);
      letter-spacing: .3px;
      transition: background 150ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    summary:hover{
      background: oklch(24% 0.03 255 / .6);
    }

      font-variant-numeric: tabular-nums;
    }

      font-size:11px;
      font-weight:600;
      color: oklch(70% 0.12 230);
      background: oklch(25% 0.04 230 / .5);
      border:1px solid oklch(35% 0.06 230 / .4);
      padding:2px 8px;
      border-radius:999px;
      white-space:nowrap;
    }

      margin-left:auto;
      width:18px;height:18px;
      opacity:.5;
      transition: transform 200ms cubic-bezier(0.16, 1, 0.3, 1), opacity 150ms;
      flex-shrink:0;
    }

    details[open] summary .chevron{
      transform: rotate(180deg);
      opacity:.7;
    }

    details > summary::-webkit-details-marker{display:none;}

function render(list){
  // Group by date (foldable)
  const groups = new Map();
  for(const e of list){
    const d = e.date || 'Unknown';
    if(!groups.has(d)) groups.set(d, []);
    groups.get(d).push(e);
  }
  const dates = Array.from(groups.keys()).sort();

  const root=document.getElementById('timeline');
  root.innerHTML='';

  let total=0;
  for(const d of dates){
    const items = groups.get(d);
    total += items.length;

    const details=document.createElement('details');
    details.open = (d >= '2026-03-20');

    const summary=document.createElement('summary');
    const weekdayMap = ['日','一','二','三','四','五','六'];
    const dt = new Date(d + 'T00:00:00+08:00');
    const wd = weekdayMap[dt.getDay()];
    summary.innerHTML = `<span class="date-label">${d}</span><span class="day-badge">周${wd} · ${items.length} 条</span><svg class="chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>`;
    details.appendChild(summary);

    const day=document.createElement('div');
    day.className='day';

    for(const e of items){
      const div=document.createElement('div');
      div.className='item';
      const tagHtml = (e.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('');
      div.innerHTML=`
        <div class="date">${escapeHtml(e.date)}</div>
        <div class="title">${escapeHtml(e.title)}</div>
        <div class="tags">${tagHtml}</div>
        <p class="desc">${escapeHtml(e.desc)}</p>
        <div class="sources">${(e.sources||[]).map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${escapeHtml(s.name)}</a>`).join(' · ')}</div>
      `;
      day.appendChild(div);
    }

    details.appendChild(day);
    root.appendChild(details);
  }

}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

const q=document.getElementById('q');
const tagFilters = Array.from(document.querySelectorAll('.tagf'));

function enabled(set){
  return new Set(set.filter(x=>x.checked).map(x=>x.value));
}

function applyFilters(){
  const s=q.value.trim().toLowerCase();
  const enabledTags=enabled(tagFilters);

  const filtered=events.filter(e=>{
    const tags=e.tags||[];
    const tagOk = tags.length===0 ? true : tags.some(t=>enabledTags.has(t));
    if(!tagOk) return false;

    if(!s) return true;
    const hay=(e.date+' '+e.title+' '+e.desc+' '+(e.sources||[]).map(x=>x.name).join(' ')+' '+tags.join(' ')).toLowerCase();
    return hay.includes(s);
  });

  render(filtered);
}

q.addEventListener('input', applyFilters);
tagFilters.forEach(el=>el.addEventListener('change', applyFilters));

applyFilters();
</script>

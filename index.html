function render(list){
  const root=document.getElementById('timeline');
  root.innerHTML='';
  for(const e of list){
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`
      <div class="date">${e.date}</div>
      <div class="title">${escapeHtml(e.title)}</div>
      <p class="desc">${escapeHtml(e.desc)}</p>
      <div class="sources">${(e.sources||[]).map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${escapeHtml(s.name)}</a>`).join(' · ')}
      </div>
    `;
    root.appendChild(div);
  }
  document.getElementById('count').textContent=`${list.length} 条事件`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

const q=document.getElementById('q');
q.addEventListener('input', ()=>{
  const s=q.value.trim().toLowerCase();
  if(!s) return render(events);
  const filtered=events.filter(e=>
    (e.date+" "+e.title+" "+e.desc+" "+(e.sources||[]).map(x=>x.name).join(' ')).toLowerCase().includes(s)
  );
  render(filtered);
});

render(events);

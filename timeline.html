
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间线</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .event { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>时间线</h1>
    
            <div class="event">
                <h3>事件1</h3>
                <p><strong>日期:</strong> 2023/10/1 08:00:00 (北京时间)</p>
                <p><strong>地点:</strong> 地点1</p>
                <p>事件1的描述</p>
            </div>
        

            <div class="event">
                <h3>事件2</h3>
                <p><strong>日期:</strong> 2023/10/2 08:00:00 (北京时间)</p>
                <p><strong>地点:</strong> 地点2</p>
                <p>事件2的描述</p>
            </div>
        
</body>
</html>
